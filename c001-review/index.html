  <main class="app" id="app"></main>

  <script>
    const payload = JSON.parse(document.getElementById("c001-review-data").textContent);
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    const tgPlatform = tg && tg.platform ? String(tg.platform).toLowerCase() : "browser";
    const state = {
      tab: "candidates",
      theme: tg && tg.colorScheme === "dark" ? "dark" : "light",
      layout: detectLayout(),
      selected: new Set(payload.selected_candidate_ids || []),
      lastAction: "ready"
    };

    if (tg) {
      tg.ready();
      tg.expand();
      if (tg.MainButton) {
        tg.MainButton.setText("產生 Email");
        tg.MainButton.onClick(() => sendAction("email_request"));
      }
    }
    applyEnvironment();
    window.addEventListener("resize", () => {
      const nextLayout = detectLayout();
      if (nextLayout !== state.layout) {
        state.layout = nextLayout;
        render();
      } else {
        applyEnvironment();
      }
    });

    function sendAction(action, extra = {}) {
      const data = {
        source: "c001_review_webapp",
        action,
        run_date: payload.run_date,
        candidate_ids: Array.from(state.selected),
        ...extra
      };
      state.lastAction = `${action}: ${data.candidate_ids.join(",") || extra.candidate_id || "none"}`;
      if (tg && typeof tg.sendData === "function") {
        tg.sendData(JSON.stringify(data));
      }
      render();
    }

    function detectLayout() {
      const width = window.innerWidth || document.documentElement.clientWidth || 0;
      const hasTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
      const hover = window.matchMedia && window.matchMedia("(hover: hover)").matches;
      const telegramDesktopPlatforms = new Set(["tdesktop", "macos", "windows", "linux"]);
      if (telegramDesktopPlatforms.has(tgPlatform)) {
        return "telegram-desktop";
      }
      if (width < 760) {
        return "mobile";
      }
      if (width >= 820 && hover && !hasTouch) {
        return "desktop";
      }
      return "mobile";
    }

    function applyEnvironment() {
      const stableHeight = tg && tg.viewportStableHeight ? tg.viewportStableHeight : window.innerHeight;
      const hasTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
      document.documentElement.dataset.theme = state.theme;
      document.documentElement.dataset.platform = tgPlatform;
      document.documentElement.dataset.layout = state.layout;
      document.documentElement.dataset.touch = hasTouch ? "touch" : "pointer";
      document.documentElement.style.setProperty("--tg-viewport-height", `${Math.max(480, Math.round(stableHeight || window.innerHeight))}px`);
    }

    function setTab(tab) {
      state.tab = tab;
      render();
    }

    function toggleTheme() {
      state.theme = state.theme === "dark" ? "light" : "dark";
      render();
    }

    function toggleCandidate(id) {
      if (state.selected.has(id)) {
        state.selected.delete(id);
      } else {
        state.selected.add(id);
      }
      sendAction("select_candidate", { candidate_ids: Array.from(state.selected) });
    }

    function feedback(candidateId, feedbackType) {
      sendAction("feedback", {
        candidate_id: candidateId,
        feedback_type: feedbackType
      });
    }

    function candidateCard(candidate) {
      const selected = state.selected.has(candidate.id);
      const sourceLink = candidate.source_url
        ? `<a class="chip" href="${escapeAttr(candidate.source_url)}" target="_blank" rel="noopener">看來源</a>`
        : "";
      return `
        <article class="card">
          <div class="candidate-head">
            <div class="code">${escapeHtml(candidate.id)}</div>
            <div>
              <h2 class="title">${escapeHtml(candidate.title)}</h2>
              <p class="reason">${escapeHtml(candidate.why_worth_attention || candidate.short_reason || "等待 owner review。")}</p>
            </div>
            <div class="score">${escapeHtml(candidate.confidence_band || "review")}</div>
          </div>
          <div class="chips">
            <button class="chip ${selected ? "selected" : "primary"}" type="button" data-select="${escapeAttr(candidate.id)}">${selected ? "已加入 Email" : "加入 Email"}</button>
            ${sourceLink}
            <button class="chip" type="button" data-feedback="${escapeAttr(candidate.id)}" data-feedback-type="good">有用</button>
            <button class="chip danger" type="button" data-feedback="${escapeAttr(candidate.id)}" data-feedback-type="bad">不相關</button>
            <button class="chip danger" type="button" data-feedback="${escapeAttr(candidate.id)}" data-feedback-type="suppress">壓掉同類</button>
          </div>
        </article>
      `;
    }

    function desktopCandidateCard(candidate) {
      const selected = state.selected.has(candidate.id);
      return `
        <article class="card desktop-card">
          <div class="candidate-head">
            <div class="code">${escapeHtml(candidate.id)}</div>
            <div>
              <h2 class="title">${escapeHtml(candidate.title)}</h2>
              <p class="reason">${escapeHtml(candidate.why_worth_attention || candidate.short_reason || "等待 owner review。")}</p>
            </div>
          </div>
          <div class="chips">
            <button class="chip ${selected ? "selected" : "primary"}" type="button" data-select="${escapeAttr(candidate.id)}">${selected ? "已加入" : "加入 Email"}</button>
            ${candidate.source_url ? `<a class="chip" href="${escapeAttr(candidate.source_url)}" target="_blank" rel="noopener">來源</a>` : ""}
          </div>
        </article>
      `;
    }

    function candidatesPanel() {
      const groups = payload.categories.map(category => {
        const cards = category.candidates.map(candidateCard).join("");
        return `<section class="category"><div class="category-title">${escapeHtml(category.label)} (${category.candidates.length})</div>${cards}</section>`;
      }).join("");
      return groups || `<p class="empty">目前沒有 owner-review 候選。</p>`;
    }

    function desktopColumns() {
      return payload.categories.map(category => `
        <section class="desktop-column">
          <div class="column-title">
            <span>${escapeHtml(category.label)}</span>
            <span class="column-count">${category.candidates.length}</span>
          </div>
          ${category.candidates.map(desktopCandidateCard).join("") || `<p class="empty">本分類沒有候選。</p>`}
        </section>
      `).join("");
    }

    function emailPanel() {
      const ids = Array.from(state.selected);
      const selectedCandidates = findCandidates(ids);
      const body = selectedCandidates.length
        ? selectedCandidates.map((candidate, index) => `${index + 1}. ${candidate.id} ${candidate.title}<br>${candidate.source_name} / ${candidate.why_worth_attention || candidate.short_reason || "review_required"}`).join("<br><br>")
        : "尚未選商品。回到候選欄，點「加入 Email」後再確認。";
      return `
        <section class="email-card">
          <div class="email-head">
            <span>Email 草稿</span>
            <span class="pill">preview only</span>
          </div>
          <div class="email-body">
            To: local config [redacted]<br>
            Subject: [C001] 今日日本選物候選 - ${ids.length} 件<br><br>
            ${body}
          </div>
          <div class="actions">
            <button class="action send" type="button" data-email-action="confirm">確認寄出</button>
            <button class="action cancel" type="button" data-email-action="cancel">取消</button>
          </div>
          <div class="action-log">Delivery gate: ${escapeHtml(payload.delivery_status)}. Gmail send still requires bot-side explicit enablement.</div>
        </section>
      `;
    }

    function feedbackPanel() {
      const rows = allCandidates().map(candidate => `
        <div class="card feedback-row">
          <div><b>${escapeHtml(candidate.id)} ${escapeHtml(candidate.title)}</b><span>${escapeHtml(candidate.source_name)} / local memory only</span></div>
          <button class="icon-button good" type="button" data-feedback="${escapeAttr(candidate.id)}" data-feedback-type="good">+</button>
          <button class="icon-button bad" type="button" data-feedback="${escapeAttr(candidate.id)}" data-feedback-type="bad">-</button>
          <button class="icon-button suppress" type="button" data-feedback="${escapeAttr(candidate.id)}" data-feedback-type="suppress">S</button>
        </div>
      `).join("");
      return `<section class="feedback-grid">${rows || `<p class="empty">目前沒有可回饋候選。</p>`}</section>`;
    }

    function render() {
      applyEnvironment();
      const selectedCount = state.selected.size;
      const app = document.getElementById("app");
      const candidateContent = candidatesPanel();
      const emailContent = emailPanel();
      const feedbackContent = feedbackPanel();
      app.innerHTML = `
        <section class="hero">
          <div class="hero-top">
            <div>
              <p class="mode">Owner review only</p>
              <h1>今日日本選物候選</h1>
              <p class="run-date">更新日期：${escapeHtml(payload.run_date)}</p>
            </div>
            <button class="theme-toggle" type="button" data-theme-toggle>
              <span>${state.theme === "dark" ? "Dark" : "Light"}</span>
              <span class="toggle-dot"></span>
            </button>
          </div>
          <div class="metrics">
            <div class="metric"><b>${payload.total_candidates}</b><span>待看商品</span></div>
            <div class="metric"><b>${payload.categories.length}</b><span>分類</span></div>
            <div class="metric"><b>${selectedCount}</b><span>Email 已選</span></div>
          </div>
        </section>

        <nav class="tabs mobile-tabs" aria-label="C001 review tabs">
          <button class="tab ${state.tab === "candidates" ? "active" : ""}" type="button" data-tab="candidates">候選</button>
          <button class="tab ${state.tab === "email" ? "active" : ""}" type="button" data-tab="email">Email</button>
          <button class="tab ${state.tab === "feedback" ? "active" : ""}" type="button" data-tab="feedback">回饋</button>
        </nav>

        <section class="panel mobile-panel ${state.tab === "candidates" ? "active" : ""}">${candidateContent}</section>
        <section class="panel mobile-panel ${state.tab === "email" ? "active" : ""}">${emailContent}</section>
        <section class="panel mobile-panel ${state.tab === "feedback" ? "active" : ""}">${feedbackContent}</section>

        <section class="desktop-board" aria-label="Desktop Mini App Board">
          <section class="desktop-hero">
            <div>
              <span class="eyebrow">Web App / owner review only</span>
              <h1>今日日本選物候選</h1>
              <div class="desktop-note">更新日期：${escapeHtml(payload.run_date)} / manual review before delivery / ${escapeHtml(payload.delivery_status)}</div>
            </div>
            <div class="desktop-metric"><strong>${payload.total_candidates}</strong><span>待看商品</span></div>
            <div class="desktop-metric"><strong>${payload.categories.length}</strong><span>分類</span></div>
            <div class="desktop-action">
              <button class="desktop-open" type="button" data-open-email>開啟今日 Review</button>
              <div class="desktop-note">Email / feedback remains owner-gated.</div>
            </div>
          </section>
          <section class="category-columns">
            ${desktopColumns()}
          </section>
          <section class="desktop-tools">
            <div class="tool-panel">
              <div class="tool-title">Email preview</div>
              ${emailContent}
            </div>
            <div class="tool-panel">
              <div class="tool-title">Feedback</div>
              ${feedbackContent}
            </div>
          </section>
        </section>

        <aside class="dock">
          <div><b>${selectedCount ? `已選 ${selectedCount} 件` : "快速回饋"}</b><span>${escapeHtml(state.lastAction)} / automatic_learning=false</span></div>
          <button class="dock-button" type="button" data-open-email>產生 Email</button>
        </aside>
      `;
      bind();
      if (tg && tg.MainButton) {
        if (selectedCount) {
          tg.MainButton.show();
        } else {
          tg.MainButton.hide();
        }
      }
    }

    function bind() {
      document.querySelector("[data-theme-toggle]")?.addEventListener("click", toggleTheme);
      document.querySelectorAll("[data-tab]").forEach(button => {
        button.addEventListener("click", () => setTab(button.dataset.tab));
      });
      document.querySelectorAll("[data-select]").forEach(button => {
        button.addEventListener("click", () => toggleCandidate(button.dataset.select));
      });
      document.querySelectorAll("[data-feedback]").forEach(button => {
        button.addEventListener("click", () => feedback(button.dataset.feedback, button.dataset.feedbackType));
      });
      document.querySelectorAll("[data-open-email]").forEach(button => {
        button.addEventListener("click", () => {
          setTab("email");
          sendAction("email_request");
        });
      });
      document.querySelectorAll("[data-email-action]").forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.emailAction === "confirm") {
            sendAction("confirm_email");
          } else {
            state.selected.clear();
            sendAction("cancel_email");
          }
        });
      });
    }

    function allCandidates() {
      return payload.categories.flatMap(category => category.candidates || []);
    }

    function findCandidates(ids) {
      const index = new Map(allCandidates().map(candidate => [candidate.id, candidate]));
      return ids.map(id => index.get(id)).filter(Boolean);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    render();
  </script>
</body>
</html>
