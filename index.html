<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Alfred_news</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="phone-shell">
      <section class="screen">
        <header class="status-bar" aria-label="Device status">
          <time id="statusTime">09:41</time>
          <div class="status-icons" aria-hidden="true">
            <span class="bars"></span>
            <span class="wifi"></span>
            <span class="battery"></span>
          </div>
        </header>

        <nav class="utility-row" aria-label="Quick controls">
          <button class="square-button" type="button" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <button class="square-button settings" id="refreshButton" type="button" aria-label="Refresh">⚙</button>
        </nav>

        <section class="time-widget" aria-label="Current time">
          <div class="time-frame left"></div>
          <div class="time-frame right"></div>
          <h2 id="heroTime">09:41</h2>
          <p id="heroDate">2026 / 06 / 23</p>
          <p id="heroNote">LIVE NEWS CLOCK</p>
        </section>

        <section class="identity" aria-label="Alfred identity">
          <div class="avatar-mark" aria-hidden="true">
            <svg viewBox="0 0 120 72" role="img">
              <path d="M8 39c13-24 31-34 52-34s39 10 52 34c-8 20-25 29-52 29S16 59 8 39Z" />
              <path class="cut" d="M25 40c8-14 20-20 35-20s27 6 35 20c-4 8-11 14-21 17l-6-13-8 14-8-14-6 13c-10-3-17-9-21-17Z" />
              <path class="cut" d="M53 19c0 9 3 14 7 14s7-5 7-14l-7-4-7 4Z" />
            </svg>
          </div>
          <h1>Alfred_news</h1>
          <p>Personal News Assistant</p>
        </section>

        <section class="news-panel" aria-label="News dashboard">
          <div class="tabs" role="tablist" aria-label="News sections">
            <button class="tab is-active" type="button" data-tab="business_tech">Business</button>
            <button class="tab" type="button" data-tab="breaking">Breaking</button>
            <button class="tab" type="button" data-tab="saved">Saved</button>
          </div>

          <div class="panel-meta">
            <span id="storyCount">0 stories</span>
            <span>Latest first</span>
          </div>

          <section class="cards" id="cards" aria-label="News list"></section>
          <section class="empty-state" id="emptyState" hidden>
            <h2>No stories here</h2>
            <p>Refresh after the next digest or save articles from the list.</p>
          </section>
        </section>

        <section class="bottom-reader" aria-label="Selected articles">
          <div>
            <strong id="selectedCount">Open selected news (0)</strong>
            <span>Read inside Telegram</span>
          </div>
          <button id="sendSelectedButton" type="button" aria-label="Send selected news">➤</button>
        </section>

        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
